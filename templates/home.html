{{define "title"}}Home{{end}}

{{define "content"}}
        <header class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p class="subtitle">System overview and recent activity</p>
            </div>
            <!-- 
                HTMX LESSON #1: hx-post and hx-target
                When we wire this up later, clicking this button will POST to /jobs/new 
                and swap content into a target element — no page reload needed.
                For now it's just a placeholder.
            -->
            <button class="btn btn-primary">+ New Job</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Jobs</div>
                <!-- 
                    HTMX LESSON #2: hx-get and hx-trigger
                    Later, we'll add something like:
                      hx-get="/api/stats/jobs" 
                      hx-trigger="load, every 30s"
                    This tells HTMX: "When this element loads (and every 30s after), 
                    GET that endpoint and replace my innerHTML with the response."
                    Your Go handler just returns a fragment of HTML — not a full page.
                -->
                <div class="stat-value">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Schedules</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Running Now</div>
                <div class="stat-value highlight-running">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed (24h)</div>
                <div class="stat-value highlight-failed">—</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="card">
                <div class="card-header">
                    <h2>Recent Runs</h2>
                    <a href="/runs" class="link-subtle">View all →</a>
                </div>
                <div class="card-body">
                    <!--
                        HTMX LESSON #3: Loading content on page load
                        Eventually this will have:
                          hx-get="/partials/recent-runs"
                          hx-trigger="load"
                          hx-swap="innerHTML"
                        The Go endpoint returns JUST the table rows — a partial HTML fragment.
                        That's the core HTMX pattern: your server returns HTML snippets, 
                        not JSON. No client-side rendering needed.
                    -->
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <p>No runs yet. Create a job to get started.</p>
                    </div>
                </div>
            </section>

            <section class="card">
                <div class="card-header">
                    <h2>Upcoming Schedules</h2>
                    <a href="/schedules" class="link-subtle">View all →</a>
                </div>
                <div class="card-body">
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <p>No schedules configured.</p>
                    </div>
                </div>
            </section>
        </div>
{{end}}
